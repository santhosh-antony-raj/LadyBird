<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <!-- Navbar  -->
        <header>
            <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
                <div class="container">
                    <a href="#" class="navbar-brand">Task Manager Project</a>
                    <button type="submit" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarnav2"><span class="navbar-toggler-icon"></span></button>
                    <div class="collapse navbar-collapse" id="navbarnav2">
                        <ul class="navbar-nav ms-auto">
                            <li class="navbar-item"><a href="" class="nav-link">Dashboard</a></li>
                            <li class="navbar-item"><a href="" class="nav-link">Contact</a></li>
                            <li class="navbar-item"><a href="" class="nav-link active">Task</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
       
        <!-- Breadcrumb -->
         <nav>
            <ol class="breadcrumb m-3">
            <li class="breadcrumb-item"><a href="">dashboard</a></li>
            <li class="breadcrumb-item"><a href="">Contact</a></li>
            <li class="breadcrumb-item active">Task</li>
        </ol>
         </nav>
        
        <!-- btn primary -->
       </header>  
       <main>
        <!-- buttons -->
         <button type="button" class="btn btn-primary m-3" data-bs-toggle="modal" data-bs-target="#modaltask">Add Task</button>
         <!-- card used to display the content in structue format-->
          <!-- Badge indicate the message -->
          <div class="card m-2">
            <div class="card-header">
                Task List
            </div>
            <div class="card-body">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center">Task 1 <span class="Badge bg-success rounded-pill text-white p-2" >New</span></li>
                    <li class="list-group-item active d-flex justify-content-between align-items-center">Task 2<span class="Badge bg-warning rounded-pill text-white p-2" >progress</span></li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">Task 3<span class="Badge bg-danger rounded-pill text-white p-2" >canceled</span></li>
                </ul>
            </div>
          </div>
          <!-- Model -->
           <div class="modal fade" id="modaltask">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Add Task</h5>
                        <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
                    </div>
                    <div class="modal-body">
                        <form action="">
                            <div class="mb-3">
                            <label for="addtaskname" class="form-label">TaskName</label>
                            <input type="text" name="addtaskname" id="addtaskname" class="form-control" placeholder="Add Task Name">
                            </div>
                            <div class="mb-3">
                            <label for="Description" class="form-label">Description</label>
                            <input type="description" name="Description" id="Description" class="form-control" placeholder="Add Task Name">
                            </div>
                            <div class="mb-3">
                            <label for="Status" class="form-label">Status</label>    
                            <select name="Status" id="" class="form-select">
                                <label for="">task status</label>
                                <option selected value="New">New</option>
                                <option value="Progress">Progress</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-primary" type="submit">Submit</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Close</button>
                    </div>
                </div>
               </div>

            </div>
            <!-- DropDown -->
             <div class="dropdown m-2">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">Action</button>
                <ul class="dropdown-menu">
                    <li><a href="" class="dropdown-item">Edit</a></li>
                    <li><a href="" class="dropdown-item">Delete</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a href="" class="dropdown-item">Save</a></li>
                </ul>
             </div>
             <!-- Pagination -->
              <nav class=" d-flex justify-content-center">
                <ul class="pagination">
                    <li class="page-item "><a href="" class="page-link">Previous</a></li>
                    <li class="page-item"><a href="" class="page-link active">1</a></li>
                    <li class="page-item"><a href="" class="page-link">2</a></li>
                    <li class="page-item"><a href="" class="page-link">3</a></li>
                    <li class="page-item"><a href="" class="page-link">Next</a></li>
                </ul>
              </nav>
       </main>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
