<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>extra things</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <!-- dflex -->
    <p  class="display-1">flex</p>
    <div class="container bg-dark rounded-pill">
        <div class="d-flex justify-content-around align-items-center" style="height: 200px;">
            <p class="bg-primary m-2 rounded-pill p-3">card1</p>
            <p class="bg-primary m-2 rounded-pill p-3">card2</p>
            <p class="bg-primary m-2 rounded-pill p-3">card3</p>
        </div>
    </div>

    <!-- Accordian & collapse -->
     <p class="display-1">Accordian</p>
     <div class="accordion" id="accordionid">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#accdiv">
                    What is Bootstrap?
                </button>
            </h2>
            <div id="accdiv" class="accordion-collapse collapse" data-bs-parent="#accordionid" >
                <div class="accordion-body">
                    Lorem ipsum dolor, sit amet consectetur adipisicing elit. Exercitationem, iste.
                </div>
                
            </div>

        </div>

     </div>

     <!-- spinner -->
      <p class="display-1">spinner</p>
      <span class="spinner-border" role="status"></span>
      <span class="spinner-grow" role="status"></span>

      <!-- progress bar -->
       <p class="display-1">progressbar</p>
       <div class="progress">
        <div class="progress-bar progress-bar-striped  progress-bar-animated" aria-valuenow="80" style="width: 80%;" aria-valuemin="0" aria-valuemax="100" role="progressbar">80%</div>
       </div>
       <!-- carousel -->
        <div id="carouselid" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner bg-dark ">
                <div class="carousel-item active "><img  src="../Html&Cssprojects/TacoShop/img/tacos_and_drink_1000x667.png" class="d-block w-100 h-auto"  alt=""></div>
                <div class="carousel-item "><img src="../Html&Cssprojects/TacoShop/img/tacos_close_up_1000x649.png" class="d-block w-100 h-auto" alt=""></div>
                <div class="carousel-item "><img src="../Html&Cssprojects/TacoShop/img/tacos_delicioso_1000x667.png" class="d-block w-100 h-auto" alt=""></div>
            </div>
            <button type="button" class="carousel-control-prev" data-bs-target="#carouselid" data-bs-slide="prev"><span class="carousel-control-prev-icon"><span class="visually-hidden">prev</span></button>
            <button type="button" class="carousel-control-next" data-bs-target="#carouselid" data-bs-slide="next"><span class="carousel-control-next-icon"><span class="visually-hidden">Next</span></button>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
