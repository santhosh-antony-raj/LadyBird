<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row  d-flex justify-content-center">
            <div class="col-12 col-md-4 col-sm-8 col-lg-4 col-xl-4">
                <div class="card w-100">
                    <!-- header -->
                    <header class="search d-flex justify-content-evenly  mt-5 mb-2  w-100">
                        <input id="inputBox"  class="text-center border-0 rounded-5 w-75 text-secondary" type="text" placeholder="Search ">
                        <button id="searchBox" class="btn btn-light rounded-5"><img src="./images/search.png" class="h-50" alt="search img"></button>
                    </header>
                    <!-- Main -->
                     <main id="main" class="d-none flex-column align-items-center">
                        <img id="cloudImg" src="./images/clouds.png" class="h-0" alt="climatepng" height="170px" width="150px">
                        <div class="h1 text-light" id="temp">22&deg;C</div>
                        <div class="h1 text-light" id="cityName">New York</div>
                     </main>
                     <!-- Footer -->
                      <footer id="footer" class="d-none justify-content-evenly  mb-5 mt-3">
                        <div class="d-flex text-light">
                            <div class="d-flex align-items-center me-2" id="Humidity"><img src="./images/humidity.png" alt="" srcset="" height="35px" width="35px"></div>
                            <div class="d-flex flex-column">
                                <span id="humPercentage">64&percnt;</span>
                                <span id="humvalue">Humidity</span>
                            </div>
                        </div>
                        <div class="d-flex">
                            <div class="d-flex align-items-center me-2" id="Windspeed" class="d-flex align-items-center"><img src="./images/wind.png" alt="" class="h-50"  height="35px" width="35px"></div>
                            <div class="d-flex flex-column">
                                <span id="winSpeed">18 Km/h</span>
                                <span id="winvalue">WindSpeed</span>
                            </div>
                        </div>
                    </footer>
                </div>
            </div>
                
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./index.js"></script>
</body>
