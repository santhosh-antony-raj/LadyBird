<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Basics</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://unpkg.com/vue@3.4.9/dist/vue.global.js"></script> 
    <script src="app.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Monster Slayer</h1>
    </header>
    <div id="game">
      <section id="monster" class="container">
        <h2>Monster Health</h2>
        <div class="healthbar">
          <div v-bind:style="upMonsterHealth" class="healthbar__value"></div>
        </div>
      </section>
      <section id="player" class="container">
        <h2>Your Health</h2>
        <div class="healthbar">
          <div v-bind:style="upPlayerHealth" class="healthbar__value"></div>
        </div>
      </section>
      <section class="container" v-if="winner">
        <h2>Game Over!</h2>
        <h3 v-if="winner === 'Monster'">Monster Win</h3>
        <h3 v-else-if="winner === 'Player'">Player Win</h3>
        <h3 v-else> It's a Draw</h3>
        <button v-on:click="startNewGame()">Start New Game</button>
      </section>
      <section id="controls" v-else>
        <button v-on:click="attackMonster()">ATTACK</button>
        <button v-bind:disabled="upSpecialAttack" v-on:click="specialAttack()">SPECIAL ATTACK</button>
        <button v-on:click="healPlayer()">HEAL</button>
        <button v-on:click="surrender()">SURRENDER</button>
      </section>
      <section id="log" class="container">
        <h2>Battle Log</h2>
        <ul>
          <li v-for="logMessage in logMessages">
            <span :class="{'log--player': logMessage.actionBy === 'Player','log--damage': logMessage.actionBy ==='Monster'}">
              {{logMessage.actionBy==='Player' ? 'Player': 'Monster'}}
            </span>
            <span v-if="logMessage.actionType === 'Heal'">Heal himeself for <span class="log--heal">{{logMessage.actionValue}}</span></span>
            <span v-else>Attack and Damage <span class="log--damage">{{logMessage.actionValue}}</span></span>
          </li>
        </ul>
      </section>
    </div>
  </body>
</html>
