<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Basics</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
     <script defer src="https://unpkg.com/vue@3.4.9/dist/vue.global.js"></script> 
    <script src="app.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Vue Dynamic Styling</h1>
    </header>
    <section id="styling">
      <!-- Dynamic styling by binding  -->
      <div 
      class= "demo" 
      :style="{borderColor: BoxASelected ? 'red' : '#ccc'}" 
       @click="boxSelected('A')">
      </div>
      <!-- Dynamic styling by binding class level -->
      <div 
        class="demo"
        :class="[{active: boxBSelected}]"
        @click="boxSelected('B')">
      </div>
      <!-- Dynamic styling by binding includes computed option way for more dynamic -->
    <div 
    class="demo"
    :class="BoxCClasses"
    @click="boxSelected('C')"></div>
    </section>
  </body>
</html>
